  <!-- ===== Early language detection & Virtual Router ===== -->
  <script>
    (function () {
      try {
        var valid = ['ar', 'en', 'fr', 'es'];
        var lang = 'ar';
        var stored = localStorage.getItem('dalilek-lang');

        var currentPath = window.location.pathname;
        var match = currentPath.match(/^\/(ar|en|fr|es)(\/|$)(.*)/);

        if (match) {
          lang = match[1];
          window.__dalilekLang = lang;
          localStorage.setItem('dalilek-lang', lang);

          var unPrefixed = '/' + match[3];
          var nativeReplaceState = window.history.replaceState;
          nativeReplaceState.call(window.history, window.history.state, '', unPrefixed + window.location.search + window.location.hash);

          var restoreUrl = function () {
            var cur = window.location.pathname;
            if (!cur.startsWith('/' + lang)) {
              var restored = '/' + lang + (cur === '/' ? '' : cur) + window.location.search + window.location.hash;
              nativeReplaceState.call(window.history, window.history.state, '', restored);
            }
          };

          var checkRoot = function () {
            var root = document.getElementById('root');
            var botSEO = document.getElementById('bot-seo-content');
            if (root && root.children.length > 0 && !botSEO) {
              restoreUrl();
              return true;
            }
            return false;
          };

          document.addEventListener('DOMContentLoaded', function () {
            if (!checkRoot()) {
              var observer = new MutationObserver(function (mutations, obs) {
                if (checkRoot()) obs.disconnect();
              });
              var root = document.getElementById('root');
              if (root) observer.observe(root, { childList: true, subtree: true });
            }
          });
        } else {
          if (stored && valid.indexOf(stored) !== -1) {
            lang = stored;
          } else {
            var bl = (navigator.language || '').toLowerCase();
            if (bl.startsWith('fr')) lang = 'fr';
            else if (bl.startsWith('es')) lang = 'es';
            else if (bl.startsWith('en')) lang = 'en';
          }
          window.__dalilekLang = lang;
        }
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      } catch (e) { }
    })();
  </script>
